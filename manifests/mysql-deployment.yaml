apiVersion: apps/v1
kind: Deployment

metadata:
  name: mysql-deployment
  namespace: db-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mysql-deployment

  template:
    metadata:
      labels:
        app: mysql-deployment

    spec:
      containers:
      - name: mysql
        image: mysql:latest

        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "root123"

        - name: MYSQL_DATABASE
          value: "mydb"
